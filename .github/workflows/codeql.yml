name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Weekly scan to catch newly-published queries against existing code.
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  # event_name keeps a push to main from cancelling the weekly sweep.
  group: codeql-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            paths: .github/workflows
          - language: rust
            paths: cwtools-rs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          paths: ${{ matrix.paths }}
          # security-extended over security-and-quality: no maintainability noise.
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
