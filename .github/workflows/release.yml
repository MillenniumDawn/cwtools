name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------------
  # Rust — matrix across all three platforms
  # -------------------------------------------------------------------------
  release-rs:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86_64
            target: x86_64-unknown-linux-gnu
            artifact: cwtools-rs-linux-x86_64
            strip: true
          - os: macos-latest
            label: macOS x86_64
            target: x86_64-apple-darwin
            artifact: cwtools-rs-macos-x86_64
            strip: true
          - os: windows-latest
            label: Windows x86_64
            target: x86_64-pc-windows-msvc
            artifact: cwtools-rs-windows-x86_64
            strip: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Windows: install rust-lld (LLVM linker) which is much faster at LTO
      # linking than MSVC link.exe.  The .cargo/config.toml sets it as the
      # default linker for x86_64-pc-windows-msvc.
      - name: Install rust-lld (Windows)
        if: runner.os == 'Windows'
        run: rustup component add rust-lld
        shell: pwsh

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}

      - name: Cache cargo target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: cwtools-rs/target
          key: ${{ matrix.os }}-cargo-target-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-target-
          save-always: true

      - name: cargo build --release
        run: cargo build --workspace --release

      - name: Strip + archive binaries
        shell: pwsh
        run: |
          $ext = if ('${{ matrix.os }}' -eq 'windows-latest') { '.exe' } else { '' }
          $extOut = if ('${{ matrix.os }}' -eq 'windows-latest') { '.zip' } else { '.tar.gz' }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($bin in @('cwtools', 'cwtools-server')) {
            $src = "target/release/${bin}${ext}"
            if (Test-Path $src) {
              if ('${{ matrix.strip }}' -eq 'true') {
                # strip on Linux/macOS
                & strip $src
              }
              Copy-Item $src "dist/${bin}${ext}"
            }
          }
          if ($extOut -eq '.zip') {
            Compress-Archive -Path dist\* -DestinationPath "cwtools-rs-${{ matrix.artifact }}.zip" -Force
          } else {
            tar -C dist -czf "cwtools-rs-${{ matrix.artifact }}.tar.gz" .
          }

      - name: Upload Rust binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: cwtools-rs/cwtools-rs-${{ matrix.artifact }}.*
          if-no-files-found: error
