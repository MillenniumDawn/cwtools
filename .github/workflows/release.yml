name: Release

on:
  # Push a v* tag to build and publish the release. workflow_dispatch is a
  # manual fallback for re-runs (off a tag ref it builds but skips publish).
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Never cancel an in-flight release; queue instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # -------------------------------------------------------------------------
  # Rust — matrix across all three platforms
  # -------------------------------------------------------------------------
  release-rs:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x86_64
            target: x86_64-unknown-linux-gnu
            artifact: cwtools-rs-linux-x86_64
            strip: true
          # macos-latest runners are arm64; the host build is aarch64 and the
          # client vsix ships osx-arm64.
          - os: macos-latest
            label: macOS arm64
            target: aarch64-apple-darwin
            artifact: cwtools-rs-macos-arm64
            strip: true
          - os: windows-latest
            label: Windows x86_64
            target: x86_64-pc-windows-msvc
            artifact: cwtools-rs-windows-x86_64
            strip: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}

      - name: Cache cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: cwtools-rs/target
          key: ${{ matrix.os }}-cargo-target-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-target-
          save-always: true

      - name: cargo build --release
        run: cargo build --workspace --release

      - name: Strip + archive binaries
        shell: pwsh
        run: |
          $ext = if ('${{ matrix.os }}' -eq 'windows-latest') { '.exe' } else { '' }
          $extOut = if ('${{ matrix.os }}' -eq 'windows-latest') { '.zip' } else { '.tar.gz' }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($bin in @('cwtools', 'cwtools-server')) {
            $src = "target/release/${bin}${ext}"
            if (Test-Path $src) {
              if ('${{ matrix.strip }}' -eq 'true') {
                # strip on Linux/macOS
                & strip $src
              }
              Copy-Item $src "dist/${bin}${ext}"
            }
          }
          if ($extOut -eq '.zip') {
            Compress-Archive -Path dist\* -DestinationPath "${{ matrix.artifact }}.zip" -Force
          } else {
            tar -C dist -czf "${{ matrix.artifact }}.tar.gz" .
          }

      - name: Upload Rust binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: cwtools-rs/${{ matrix.artifact }}.*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish the archives + checksums as the GitHub release for the pushed tag.
  # Skipped for a workflow_dispatch off a tag ref (build-only re-run).
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub release
    needs: release-rs
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cwtools-rs-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum -- * > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Idempotent for re-runs: upload into an existing release instead of
        # failing on create.
        run: |
          tag='${{ github.ref_name }}'
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" artifacts/* --clobber -R "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" artifacts/* --verify-tag --title "$tag" --generate-notes -R "$GITHUB_REPOSITORY"
          fi
