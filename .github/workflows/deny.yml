name: cargo-deny

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Weekly run to catch newly-published advisories against the lockfile.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: deny-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          manifest-path: cwtools-rs/Cargo.toml
