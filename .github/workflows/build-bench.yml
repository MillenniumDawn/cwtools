# Build-time benchmarking workflow.
#
# Measures clean release-build time across platforms so we can track the
# Windows-vs-Linux gap and verify improvements.  Runs on demand (workflow_dispatch)
# and on pushes to the perf/build-time-improvements branch.
#
# Results are printed as a job summary and can be compared across runs.

name: Build bench

on:
  workflow_dispatch:
  push:
    branches: [perf/build-time-improvements]

concurrency:
  group: build-bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-bench:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # ── Registry cache (rarely changes, separate from target) ──────────
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}

      # ── Clean release build with timing ────────────────────────────────
      - name: cargo clean
        run: cargo clean

      - name: cargo build --release
        id: build
        run: |
          $timer = [System.Diagnostics.Stopwatch]::StartNew()
          cargo build --workspace --release
          $timer.Stop()
          "duration_ms=$($timer.ElapsedMilliseconds)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "duration_s=$([math]::Round($timer.Elapsed.TotalSeconds, 1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      # ── Binary info ───────────────────────────────────────────────────
      - name: Binary sizes
        id: sizes
        run: |
          $cli = Get-Item "target/release/cwtools.exe" -ErrorAction SilentlyContinue
          $srv = Get-Item "target/release/cwtools-server.exe" -ErrorAction SilentlyContinue
          if (-not $cli) { $cli = Get-Item "target/release/cwtools" -ErrorAction SilentlyContinue }
          if (-not $srv) { $srv = Get-Item "target/release/cwtools-server" -ErrorAction SilentlyContinue }
          $cliSize = if ($cli) { $cli.Length } else { 0 }
          $srvSize = if ($srv) { $srv.Length } else { 0 }
          "cli_bytes=$cliSize" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "srv_bytes=$srvSize" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      # ── Summary ────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          $os = "${{ matrix.os }}"
          $dur = "${{ steps.build.outputs.duration_s }}s"
          $cli = [math]::Round(${{ steps.sizes.outputs.cli_bytes }} / 1MB, 1)
          $srv = [math]::Round(${{ steps.sizes.outputs.srv_bytes }} / 1MB, 1)
          Write-Host "## $os build results" -ForegroundColor Cyan
          Write-Host "- Clean release build: **$dur**"
          Write-Host "- cwtools: **${cli}MB**"
          Write-Host "- cwtools-server: **${srv}MB**"
        shell: pwsh

      - name: Summary job annotation
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const os = '${{ matrix.os }}';
            const dur = '${{ steps.build.outputs.duration_s }}s';
            const cli = '${{ steps.sizes.outputs.cli_bytes }}';
            const srv = '${{ steps.sizes.outputs.srv_bytes }}';
            core.summary.addHeading(`${os} build results`, 3);
            core.summary.addRaw(`- Clean release build: **${dur}**\n`);
            core.summary.addRaw(`- cwtools: **${(cli/1e6).toFixed(1)}MB**\n`);
            core.summary.addRaw(`- cwtools-server: **${(srv/1e6).toFixed(1)}MB**\n`);
            core.summary.write();
