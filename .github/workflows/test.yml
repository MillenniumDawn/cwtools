name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; individual jobs widen as needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  # -------------------------------------------------------------------------
  # Rust
  # -------------------------------------------------------------------------
  lint-rs:
    name: Rust format / clippy / unused-deps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo machete (unused dependencies)
        run: |
          cargo install cargo-machete --locked
          cargo machete

  test-rs:
    name: Rust build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo build (debug)
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

  build-rs-release:
    name: Rust release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry & target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo build --release
        run: cargo build --workspace --release
      - name: Upload release binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cwtools-rs-release-linux
          path: |
            cwtools-rs/target/release/cwtools
            cwtools-rs/target/release/cwtools-server
          if-no-files-found: warn
