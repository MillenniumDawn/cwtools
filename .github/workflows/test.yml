name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; individual jobs widen as needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  RUST_BACKTRACE: "1"

jobs:
  # -------------------------------------------------------------------------
  # F# / .NET side
  # -------------------------------------------------------------------------
  lint-fs:
    name: F# format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/paket.dependencies', '**/*.fsproj', 'Directory.Packages.props', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore local tools (fake, fantomas)
        run: dotnet tool restore
      - name: Check formatting (fantomas)
        run: dotnet run --project build -- -t CheckFormat

  test-fs:
    name: F# build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/paket.dependencies', '**/*.fsproj', 'Directory.Packages.props', '.config/dotnet-tools.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore local tools (fake, fantomas)
        run: dotnet tool restore
      - name: Build + test
        run: /bin/sh ./build.sh Test

  # -------------------------------------------------------------------------
  # Rust side
  # -------------------------------------------------------------------------
  lint-rs:
    name: Rust format / clippy / unused-deps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo machete (unused dependencies)
        run: |
          cargo install cargo-machete --locked
          cargo machete

  test-rs:
    name: Rust build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo build (debug)
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

  build-rs-release:
    name: Rust release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cwtools-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: cargo build --release
        run: cargo build --workspace --release
      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: cwtools-rs-release-linux
          path: |
            cwtools-rs/target/release/cwtools
            cwtools-rs/target/release/cwtools-server
          if-no-files-found: warn
