name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege; individual jobs widen as needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  # Covers the Actions deps. Rust advisories are cargo-deny's job, in deny.yml,
  # since cwtools-rs/Cargo.lock is gitignored and absent from the dep graph.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # -------------------------------------------------------------------------
  # Rust
  # -------------------------------------------------------------------------
  lint-rs:
    name: Rust format / clippy / unused-deps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      # Registry cache (rarely changes, separate from target so a lockfile
      # bump doesn't invalidate the compiled artifacts).
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}
      # Target cache: save even on failure so a cancelled build doesn't
      # force a full rebuild on the next run.
      - name: Cache cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cwtools-rs/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-
          save-always: true
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo machete (unused dependencies)
        run: |
          cargo install cargo-machete --locked
          cargo machete

  # Releases ship Linux, Windows, and macOS binaries, so a platform-only
  # break must fail here before it ships (#66). Lint and the release build
  # stay Linux-only.
  test-rs:
    name: Rust build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}
      - name: Cache cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cwtools-rs/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-
          save-always: true
      - name: cargo build (debug)
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

  build-rs-release:
    name: Rust release build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cwtools-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('cwtools-rs/Cargo.lock') }}
      - name: Cache cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cwtools-rs/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('cwtools-rs/Cargo.lock', 'cwtools-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-
          save-always: true
      - name: cargo build --release
        run: cargo build --workspace --release
      - name: Upload release binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cwtools-rs-release-linux
          path: |
            cwtools-rs/target/release/cwtools
            cwtools-rs/target/release/cwtools-server
          if-no-files-found: warn
